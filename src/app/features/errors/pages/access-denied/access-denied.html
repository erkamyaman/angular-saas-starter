<div class="access-denied">
  <i class="pi pi-lock icon"></i>
  <h1>{{ 'access_denied_title' | translate }}</h1>
  <p>
    {{ 'access_denied_desc' | translate }}
    @if (permission) {
      <br />
      <small>{{ 'required_permission' | translate }}: <code>{{ permission }}</code></small>
    }
  </p>
  <p-button [label]="'go_to_dashboard' | translate" icon="pi pi-home" routerLink="/dashboard" />
</div>
