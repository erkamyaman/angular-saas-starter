<p-card styleClass="register-card">
  <ng-template pTemplate="header">
    <div class="card-header">
      <h1>{{ 'create_account' | translate }}</h1>
      <p>{{ 'register_subtitle' | translate }}</p>
    </div>
  </ng-template>

  <form class="form" [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="row">
      <label>
        <span>{{ 'first_name' | translate }}</span>
        <input pInputText type="text" formControlName="firstName" autocomplete="given-name" />
        <app-field-error [control]="form.get('firstName')" />
      </label>
      <label>
        <span>{{ 'last_name' | translate }}</span>
        <input pInputText type="text" formControlName="lastName" autocomplete="family-name" />
        <app-field-error [control]="form.get('lastName')" />
      </label>
    </div>

    <label>
      <span>{{ 'email' | translate }}</span>
      <input pInputText type="email" formControlName="email" autocomplete="email" />
      <app-field-error [control]="form.get('email')" />
    </label>

    <label>
      <span>{{ 'password' | translate }}</span>
      <p-password
        formControlName="password"
        [toggleMask]="true"
        [feedback]="false"
        [fluid]="true"
        autocomplete="new-password"
      />
      <app-field-error [control]="form.get('password')" />
    </label>

    @if (error(); as err) {
      <div class="form-error">{{ err }}</div>
    }

    <p-button type="submit" [label]="'create_account' | translate" [fluid]="true" [loading]="submitting()" />

    <p class="alt">
      {{ 'has_account' | translate }} <a routerLink="/login">{{ 'sign_in' | translate }}</a>
    </p>
  </form>
</p-card>
